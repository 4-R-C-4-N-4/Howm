name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ─────────────────────────────────────────────
  # Lint & Format
  # ─────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            node/target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('node/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-lint-

      - name: Check formatting
        working-directory: node
        run: cargo fmt --all -- --check

      - name: Clippy
        working-directory: node
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ─────────────────────────────────────────────
  # Build & Test (matrix)
  # ─────────────────────────────────────────────
  build:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            node/target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('node/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-

      - name: Build
        working-directory: node
        run: cargo build --release --target ${{ matrix.target }}

      - name: Run unit tests
        working-directory: node
        run: cargo test --release --target ${{ matrix.target }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: daemon-${{ matrix.target }}
          path: |
            node/target/${{ matrix.target }}/release/daemon
            node/target/${{ matrix.target }}/release/daemon.exe
          if-no-files-found: error
          retention-days: 7

  # ─────────────────────────────────────────────
  # Docker (social-feed capability)
  # ─────────────────────────────────────────────
  docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build social-feed capability image
        uses: docker/build-push-action@v6
        with:
          context: capabilities/social-feed
          push: false
          tags: cap-social-feed:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # Web UI
  # ─────────────────────────────────────────────
  web-ui:
    name: Build Web UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/web/package-lock.json

      - name: Install dependencies
        working-directory: ui/web
        run: npm ci

      - name: Lint
        working-directory: ui/web
        run: npm run lint --if-present

      - name: Build
        working-directory: ui/web
        run: npm run build
