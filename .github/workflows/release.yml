name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─────────────────────────────────────────────
  # Build the web UI (shared across all platforms)
  # ─────────────────────────────────────────────
  build-ui:
    name: Build UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/web/package-lock.json

      - name: Install & build
        working-directory: ui/web
        run: |
          npm ci
          npm run build

      - name: Upload UI dist
        uses: actions/upload-artifact@v4
        with:
          name: ui-dist
          path: ui/web/dist
          retention-days: 5
          if-no-files-found: error

  # ─────────────────────────────────────────────
  # Build release binaries for all platforms
  # ─────────────────────────────────────────────
  build-binaries:
    name: Build (${{ matrix.target }})
    needs: [build-ui]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: daemon
            archive: howm-linux-amd64.tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: daemon
            archive: howm-linux-arm64.tar.gz
            cross: true
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: daemon
            archive: howm-macos-arm64.tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: daemon
            archive: howm-macos-amd64.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: daemon.exe
            archive: howm-windows-amd64.zip
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            node/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-release-${{ hashFiles('node/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-release-

      - name: Build release binary
        working-directory: node
        run: cargo build --release --target ${{ matrix.target }}

      - name: Download UI dist
        uses: actions/download-artifact@v4
        with:
          name: ui-dist
          path: ui-dist

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p staging/ui
          cp node/target/${{ matrix.target }}/release/${{ matrix.artifact }} staging/
          cp README.md LICENSE staging/
          cp -r ui-dist/* staging/ui/
          cd staging
          tar czf ../${{ matrix.archive }} .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging/ui
          Copy-Item "node/target/${{ matrix.target }}/release/${{ matrix.artifact }}" staging/
          Copy-Item README.md, LICENSE staging/
          Copy-Item -Recurse ui-dist/* staging/ui/
          Compress-Archive -Path staging/* -DestinationPath ${{ matrix.archive }}

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}
          retention-days: 5
          if-no-files-found: error

  # ─────────────────────────────────────────────
  # Build & push Docker images
  # ─────────────────────────────────────────────
  docker:
    name: Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version and lowercase owner
        id: version
        run: |
          echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build & push social-feed
        uses: docker/build-push-action@v6
        with:
          context: capabilities/social-feed
          push: true
          tags: |
            ghcr.io/${{ steps.version.outputs.REPO_LC }}/cap-social-feed:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ steps.version.outputs.REPO_LC }}/cap-social-feed:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # Create GitHub Release
  # ─────────────────────────────────────────────
  release:
    name: Create Release
    needs: [build-binaries, docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: howm-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum howm-* > ../SHA256SUMS.txt
          cd ..
          cat SHA256SUMS.txt

      - name: Generate changelog
        id: changelog
        run: |
          # Get commits since last tag
          PREV_TAG=$(git tag --sort=-creatordate | head -2 | tail -1)
          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "${GITHUB_REF#refs/tags/}" ]; then
            echo "body=Initial release" >> "$GITHUB_OUTPUT"
          else
            CHANGES=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges)
            # Write to file to handle multiline
            {
              echo "## What's Changed"
              echo ""
              echo "$CHANGES"
              echo ""
              echo "## Checksums (SHA-256)"
              echo '```'
              cat SHA256SUMS.txt
              echo '```'
            } > release_notes.md
          fi

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          cp artifacts/howm-* release-assets/
          cp SHA256SUMS.txt release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
          files: release-assets/*
          generate_release_notes: true
