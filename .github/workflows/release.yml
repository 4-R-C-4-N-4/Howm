name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CAPABILITIES: "feed files messaging presence voice"

jobs:
  # ─────────────────────────────────────────────
  # Build the web UI (shared across all platforms)
  # ─────────────────────────────────────────────
  build-ui:
    name: Build UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ui/web/package-lock.json

      - name: Install & build
        working-directory: ui/web
        run: |
          npm ci
          npm run build

      - name: Upload UI dist
        uses: actions/upload-artifact@v4
        with:
          name: ui-dist
          path: ui/web/dist
          retention-days: 5
          if-no-files-found: error

  # ─────────────────────────────────────────────
  # Build release binaries for all platforms
  # ─────────────────────────────────────────────
  build-binaries:
    name: Build (${{ matrix.target }})
    needs: [build-ui]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: howm
            cap_artifact_suffix: ""
            archive: howm-linux-amd64.tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: howm
            cap_artifact_suffix: ""
            archive: howm-linux-arm64.tar.gz
            cross: true
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: howm
            cap_artifact_suffix: ""
            archive: howm-macos-arm64.tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: howm
            cap_artifact_suffix: ""
            archive: howm-macos-amd64.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: howm.exe
            cap_artifact_suffix: ".exe"
            archive: howm-windows-amd64.zip
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - name: Download UI dist
        uses: actions/download-artifact@v4
        with:
          name: ui-dist
          path: ui/web/dist

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            node/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-release-${{ hashFiles('node/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-release-

      - name: Build release binary (howm)
        working-directory: node
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build capability binaries (Unix)
        if: runner.os != 'Windows'
        run: |
          for cap in ${{ env.CAPABILITIES }}; do
            echo "Building capability: $cap"
            cd capabilities/$cap
            cargo build --release --target ${{ matrix.target }}
            cd ../..
          done

      - name: Build capability binaries (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          foreach ($cap in "${{ env.CAPABILITIES }}".Split(" ")) {
            Write-Host "Building capability: $cap"
            Set-Location "capabilities/$cap"
            cargo build --release --target ${{ matrix.target }}
            Set-Location "../.."
          }

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p staging
          # Main binary
          cp node/target/${{ matrix.target }}/release/${{ matrix.artifact }} staging/
          cp README.md LICENSE staging/
          # Capabilities
          for cap in ${{ env.CAPABILITIES }}; do
            mkdir -p staging/capabilities/$cap
            # Binary
            cp capabilities/$cap/target/${{ matrix.target }}/release/$cap staging/capabilities/$cap/
            # Manifests and config
            cp capabilities/$cap/manifest.json staging/capabilities/$cap/ 2>/dev/null || true
            cp capabilities/$cap/capability.yaml staging/capabilities/$cap/ 2>/dev/null || true
            # Static UI assets
            if [ -d "capabilities/$cap/ui" ]; then
              cp -r capabilities/$cap/ui staging/capabilities/$cap/
            fi
          done
          cd staging
          tar czf ../${{ matrix.archive }} .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging
          # Main binary
          Copy-Item "node/target/${{ matrix.target }}/release/${{ matrix.artifact }}" staging/
          Copy-Item README.md, LICENSE staging/
          # Capabilities
          foreach ($cap in "${{ env.CAPABILITIES }}".Split(" ")) {
            New-Item -ItemType Directory -Force -Path "staging/capabilities/$cap"
            # Binary
            Copy-Item "capabilities/$cap/target/${{ matrix.target }}/release/$cap${{ matrix.cap_artifact_suffix }}" "staging/capabilities/$cap/"
            # Manifests and config
            if (Test-Path "capabilities/$cap/manifest.json") {
              Copy-Item "capabilities/$cap/manifest.json" "staging/capabilities/$cap/"
            }
            if (Test-Path "capabilities/$cap/capability.yaml") {
              Copy-Item "capabilities/$cap/capability.yaml" "staging/capabilities/$cap/"
            }
            # Static UI assets
            if (Test-Path "capabilities/$cap/ui") {
              Copy-Item -Recurse "capabilities/$cap/ui" "staging/capabilities/$cap/"
            }
          }
          Compress-Archive -Path staging/* -DestinationPath ${{ matrix.archive }}

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}
          retention-days: 5
          if-no-files-found: error

  # ─────────────────────────────────────────────
  # Create GitHub Release
  # ─────────────────────────────────────────────
  release:
    name: Create Release
    needs: [build-binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: howm-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum howm-* > ../SHA256SUMS.txt
          cd ..
          cat SHA256SUMS.txt

      - name: Generate changelog
        id: changelog
        run: |
          # Get commits since last tag
          PREV_TAG=$(git tag --sort=-creatordate | head -2 | tail -1)
          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "${GITHUB_REF#refs/tags/}" ]; then
            echo "body=Initial release" >> "$GITHUB_OUTPUT"
          else
            CHANGES=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges)
            # Write to file to handle multiline
            {
              echo "## What's Changed"
              echo ""
              echo "$CHANGES"
              echo ""
              echo "## Checksums (SHA-256)"
              echo '```'
              cat SHA256SUMS.txt
              echo '```'
            } > release_notes.md
          fi

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          cp artifacts/howm-* release-assets/
          cp SHA256SUMS.txt release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
          files: release-assets/*
          generate_release_notes: true
