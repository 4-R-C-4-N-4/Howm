version: '3.8'
# Multi-node test setup with port offsets
# node-a: 7000/7001, node-b: 7010/7011, node-c: 7020/7021
# Use tests/integration/test_node.sh for automated testing instead.
services:
  node-a:
    image: ghcr.io/howm/daemon:latest
    ports:
      - "7000:7000"
    volumes:
      - ./test-data/a:/data
    environment:
      HOWM_PORT: "7000"
      HOWM_NODE_NAME: "node-a"
      HOWM_DATA_DIR: "/data"

  node-b:
    image: ghcr.io/howm/daemon:latest
    ports:
      - "7010:7010"
    volumes:
      - ./test-data/b:/data
    environment:
      HOWM_PORT: "7010"
      HOWM_NODE_NAME: "node-b"
      HOWM_DATA_DIR: "/data"

  node-c:
    image: ghcr.io/howm/daemon:latest
    ports:
      - "7020:7020"
    volumes:
      - ./test-data/c:/data
    environment:
      HOWM_PORT: "7020"
      HOWM_NODE_NAME: "node-c"
      HOWM_DATA_DIR: "/data"
