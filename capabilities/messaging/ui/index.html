<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Howm — Messaging</title>
  <link rel="stylesheet" href="messaging.css" />
</head>
<body>
  <header>
    <h1>💬 Messaging</h1>
    <nav>
      <a href="/app/" class="nav-link">← Dashboard</a>
    </nav>
  </header>

  <main>
    <div id="sidebar">
      <div class="sidebar-header">
        <h2>Conversations</h2>
      </div>
      <ul id="conversation-list"></ul>
      <p id="no-conversations" class="empty-state" style="display:none">No conversations yet</p>
    </div>

    <div id="chat-area">
      <div id="chat-header" style="display:none">
        <span id="chat-peer-name"></span>
      </div>
      <div id="messages"></div>
      <form id="send-form" style="display:none">
        <input type="text" id="msg-input" placeholder="Type a message…" autocomplete="off" maxlength="4096" />
        <button type="submit">Send</button>
      </form>
      <p id="select-prompt" class="empty-state">Select a conversation to start messaging</p>
    </div>
  </main>

  <script src="messaging.js"></script>
</body>
</html>
