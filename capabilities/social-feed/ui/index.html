<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feed — Howm</title>
  <link rel="stylesheet" href="/theme.css" />
  <link rel="stylesheet" href="/cap/social/ui/feed.css" />
</head>
<body>
  <div id="app">
    <div id="composer">
      <textarea id="post-content" placeholder="What's happening?" rows="3"></textarea>
      <div id="composer-actions">
        <button id="post-btn" onclick="submitPost()">Post</button>
        <span id="post-status"></span>
      </div>
    </div>
    <div id="feed-header">
      <h2>Feed</h2>
      <div id="filter-buttons">
        <button class="filter-btn active" onclick="setFilter(null, this)">All</button>
        <button class="filter-btn" onclick="setFilter('friend', this)">Friends Only</button>
      </div>
    </div>
    <div id="feed-errors"></div>
    <div id="feed-list"><p class="muted">Loading feed…</p></div>
  </div>
  <script src="/cap/social/ui/feed.js"></script>
</body>
</html>
